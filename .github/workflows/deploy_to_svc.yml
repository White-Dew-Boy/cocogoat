name: Sync, Build and Deploy

on:
  schedule:
    - cron: '0 0 * * 1'   # 每天 UTC 0 点（北京时间 8 点）自动运行
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 用于推送同步后的代码

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ========== 第1步：拉取你的 Fork 仓库 ==========
      - name: Checkout your fork
        uses: actions/checkout@v3
        with:
          # 需要完整的 git 历史才能正确合并
          fetch-depth: 0

      # ========== 第2步：同步原仓库的更新 ==========
      - name: Sync with upstream (YuehaiTeam/cocogoat)
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: YuehaiTeam/cocogoat
          upstream_sync_branch: main      # 原仓库的分支，根据实际情况改
          target_sync_branch: main        # 你仓库的分支
          test_mode: false

      # ========== 修复vLoading的导入问题 ==========
      # - name: Apply vLoading fix patch
      #   run: |
          
      #     if [ -f "$PATCH_FILE" ]; then
      #       echo "📦 Applying patch: $PATCH_FILE"
            
      #       # 先测试 patch 是否能应用
      #       if patch -p1 --dry-run < "$PATCH_FILE" 2>/dev/null; then
      #         patch -p1 < "$PATCH_FILE"
      #         echo "✅ Patch applied successfully"
      #       else
      #         echo "⚠️ Patch failed, trying fallback sed command..."
      #         find src -name "*.vue" -type f -exec sed -i 's/import { vLoading } from/import vLoading from/g' {} \;
      #         echo "✅ Fallback applied"
      #       fi
      #     else
      #       echo "⚠️ Patch file not found, trying sed fallback..."
      #       find src -name "*.vue" -type f -exec sed -i 's/import { vLoading } from/import vLoading from/g' {} \;
      #     fi

      # ========== 第3步：设置 Node.js ==========
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ========== 第4步：安装 pnpm ==========
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # ========== 第5步：安装依赖 ==========
      - name: Install dependencies
        run: pnpm install

      # ========== 第6步：打包项目 ==========
      - name: Build project
        run: pnpm build

      # ========== 第7步：部署到服务器 ==========
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-avz --delete'
          SOURCE: 'dist/'
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_TARGET_PATH }}

          
