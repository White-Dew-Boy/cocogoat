name: Build My Production

on:
  schedule:
    - cron: '0 0 * * 1'   
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 用于推送同步后的代码

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v3

      - name: Unpack git objects
        run: |
          mv .git/objects/pack .
          git unpack-objects < pack/*.pack
          rm -rf pack

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - uses: szenius/set-timezone@v1.1
        with:
          timezoneLinux: "Asia/Shanghai"
          timezoneMacos: "Asia/Shanghai"
          timezoneWindows: "China Standard Time"

      - uses: pnpm/action-setup@v2

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "::set-output name=pnpm_cache_dir::$(pnpm store path)"

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: cocogoat-web-report
          path: dist/report.html

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: cocogoat-web
          path: dist/

      - name: Remove unused files
        run: |
          rm -rf dist/assets/*.wasm
          rm -rf dist/assets/*.ort
          rm -rf dist/report.html

      - name: Deploy files
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-avz --delete'
          SOURCE: 'dist/'
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_TARGET_PATH }}
